# ============================================================
# BRD Platform – Full Stack Docker Compose
# EC2 IP : 13.232.219.91  |  Base URL : http://localhost
# ============================================================
# PORT MAP
# ── Infrastructure ──────────────────────────────────────────
#   PostgreSQL   : 5432
#   Redis        : 6379
#   pgAdmin      : 5050
# ── Backends (Django / Gunicorn) ────────────────────────────
#   Merged Tenant+Master : 8000
#   Master Admin         : 8001
#   Tenant Admin         : 8002
#   Channel Partner      : 8003
#   Sales CRM            : 8004
#   Fraud Team           : 8005
#   Operation Verify     : 8006
#   Valuation            : 8007
#   Borrower App         : 8008
#   Agents App           : 8009
#   CRM                  : 8010
#   Finance Dashboard    : 8011
#   Legal Dashboard      : 8012
#   Website Main         : 8013
# ── Frontends (React / Nginx) ───────────────────────────────
#   Merged Tenant+Master : 3000
#   Tenant Admin         : 3001
#   Master Admin         : 3002
#   Operation Verify     : 3003
#   Sales CRM            : 3004
#   Finance Dashboard    : 3005
#   Channel Partner      : 3006
#   Legal Dashboard      : 3007
#   Fraud Team           : 3008
#   Valuation            : 3009
#   CRM                  : 3010
#   Website Main         : 3011
# ============================================================

version: "3.9"

# ─────────────────────────────────────────────────────────────
# SHARED ENVIRONMENT (backend common vars)
# ─────────────────────────────────────────────────────────────
x-django-env: &django-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-super-secret-key-change-in-production}
  SSO_SECRET_KEY: ${SSO_SECRET_KEY:-FfhkVs-_QlvVcbNSALY9HQxU72pkxWqnYlLy_mwIbAk}
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: "*"
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER:-brd_user}
  DB_PASSWORD: ${DB_PASSWORD:-Brd@Secure2024!}
  REDIS_URL: redis://redis:6379/0
  CORS_ALLOWED_ORIGINS: >-
    http://localhost:3000,http://localhost:3001,http://localhost:3002,
    http://localhost:3003,http://localhost:3004,http://localhost:3005,
    http://localhost:3006,http://localhost:3007,http://localhost:3008,
    http://localhost:3009,http://localhost:3010,http://localhost:3011,
    http://13.232.219.91:3000,http://13.232.219.91:3001,http://13.232.219.91:3002

# ─────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────
networks:
  brd_network:
    driver: bridge

# ─────────────────────────────────────────────────────────────
# VOLUMES (persistent data)
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  merged_static:
  master_static:
  tenant_static:

# ═════════════════════════════════════════════════════════════
# SERVICES
# ═════════════════════════════════════════════════════════════
services:

  # ──────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: brd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASSWORD:-postgres_root_pass}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - brd_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brd_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - brd_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: brd_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@brd.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - brd_network
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────
  # BACKEND SERVICES
  # ──────────────────────────────────────────

  # 1. Merged Tenant + Master Backend  →  :8000
  merged-backend:
    build:
      context: ./BRD-MergedTenantMaster-Backend
      dockerfile: Dockerfile
    container_name: brd_merged_backend
    restart: unless-stopped
    environment:
      <<: *django-env
      DB_NAME: brd_merged_db
      DJANGO_SETTINGS_MODULE: brd_platform.settings
    ports:
      - "8000:8000"
    volumes:
      - merged_static:/app/staticfiles
    networks:
      - brd_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 2. Master Admin Backend  →  :8001
